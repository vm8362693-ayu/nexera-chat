<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexera Chat</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Nexera Chat</h1>
<button id="installBtn" style="display:none;">Install Nexera App</button>

  <div id="chatBox" style="height:400px;overflow-y:scroll;border:1px solid #ccc;"></div>

  <input id="msgInput" type="text" placeholder="Type your message">
  <button id="sendBtn">Send</button>
  <button onclick="openAdmin()">Admin Dashboard</button>

  <iframe id="adminFrame" src="/admin.html" style="width:100%; height:300px; display:none; border:none;"></iframe>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let username = prompt("Enter your name:");

if(!username){
  username = "Guest";
}

socket.emit("join", username);

    document.getElementById("sendBtn").addEventListener("click", () => {
      const msg = document.getElementById("msgInput").value;
      socket.emit("chat message", msg);
      document.getElementById("msgInput").value = "";
    });

    socket.on("chat message", (data) => {
      const chatBox = document.getElementById("chatBox");
      chatBox.innerHTML += `<p><b>${data.user}:</b> ${data.message}</p>`;
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    socket.on("blocked", (msg) => {
      alert(msg);
    });

    function openAdmin() {
      document.getElementById('adminFrame').style.display = 'block';
    }
  </script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("Service Worker Failed", err));
}
</script>
<script>
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log("User response:", outcome);
    deferredPrompt = null;
  }
});
</script>
</body>
</html>
